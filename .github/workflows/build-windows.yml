name: Build Windows Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ae-windows:
    name: Build AE Plugin (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Create output directory and Adobe plugin dir
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\ae-build-output"
          New-Item -ItemType Directory -Force -Path "C:\Program Files\Adobe\Common\Plug-ins\7.0\MediaCore\TrackerLabs"
        shell: pwsh

      - name: Build TrackerLabs AE plugin
        run: |
          msbuild `
            "$env:GITHUB_WORKSPACE\TrackerLabs_AEX_WIN\TrackerLabs\src\Win\TrackerLabs.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal
        shell: pwsh

      - name: Locate .aex output
        run: |
          # Search everywhere for the .aex
          $aex = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.aex" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $aex) {
            # Also check the Adobe path
            $aex = Get-ChildItem -Path "C:\Program Files\Adobe" -Filter "*.aex" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $aex) {
            Write-Error "No .aex file found anywhere"
            exit 1
          }
          Write-Host "Found: $($aex.FullName)"
          Copy-Item $aex.FullName -Destination "$env:GITHUB_WORKSPACE\TrackerLabs.aex"
        shell: pwsh

      - name: Upload TrackerLabs.aex artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackerLabs-AE-Windows-x64
          path: TrackerLabs.aex
          if-no-files-found: error

  build-resolve-windows:
    name: Build Resolve OFX Plugin (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install OpenCL SDK
        run: |
          # Download OpenCL ICD Loader from Khronos
          $oclDir = "$env:GITHUB_WORKSPACE\TrackerLabsResolvePlugin_Win\TrackerLabsResolvePlugin\opencl"
          New-Item -ItemType Directory -Force -Path "$oclDir\lib\x64"
          
          # Download the OpenCL SDK from vcpkg/nuget
          nuget install OpenCL -Version 2.2.0 -OutputDirectory "$env:TEMP\opencl-sdk"
          
          # Find the lib file
          $lib = Get-ChildItem -Path "$env:TEMP\opencl-sdk" -Filter "OpenCL.lib" -Recurse | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          if ($lib) {
            Copy-Item $lib.FullName -Destination "$oclDir\lib\x64\OpenCL.lib"
            Write-Host "OpenCL.lib installed at: $oclDir\lib\x64\OpenCL.lib"
          } else {
            # Fallback: use the Windows SDK's OpenCL.lib
            $sdkLib = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\Lib" -Filter "OpenCL.lib" -Recurse | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
            if ($sdkLib) {
              Copy-Item $sdkLib.FullName -Destination "$oclDir\lib\x64\OpenCL.lib"
              Write-Host "OpenCL.lib from Windows SDK: $($sdkLib.FullName)"
            } else {
              Write-Error "Could not find OpenCL.lib anywhere"
              exit 1
            }
          }
        shell: pwsh

      - name: Build TrackerLabs Resolve OFX plugin
        run: |
          msbuild `
            "$env:GITHUB_WORKSPACE\TrackerLabsResolvePlugin_Win\TrackerLabsResolvePlugin\src\TrackerLabsResolvePlugin.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal
        shell: pwsh

      - name: Locate .ofx output
        run: |
          $searchRoot = "$env:GITHUB_WORKSPACE\TrackerLabsResolvePlugin_Win"
          # Look for the .ofx binary or .ofx.bundle directory
          $ofx = Get-ChildItem -Path $searchRoot -Filter "*.ofx" -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          $bundle = Get-ChildItem -Path $searchRoot -Filter "*.ofx.bundle" -Directory -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($bundle) {
            Write-Host "Found bundle: $($bundle.FullName)"
            Add-Content -Path $env:GITHUB_ENV -Value "OFX_PATH=$($bundle.FullName)"
          } elseif ($ofx) {
            Write-Host "Found OFX: $($ofx.FullName)"
            Add-Content -Path $env:GITHUB_ENV -Value "OFX_PATH=$($ofx.FullName)"
          } else {
            # Search entire workspace
            $ofx = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.ofx" -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($ofx) {
              Write-Host "Found OFX in workspace: $($ofx.FullName)"
              Add-Content -Path $env:GITHUB_ENV -Value "OFX_PATH=$($ofx.FullName)"
            } else {
              Write-Error "No .ofx or .ofx.bundle found"
              exit 1
            }
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackerLabs-Resolve-Windows-x64
          path: ${{ env.OFX_PATH }}
          if-no-files-found: error
