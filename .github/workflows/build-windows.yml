name: Build Windows Plugins

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ae-windows:
    name: Build AE Plugin (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Create Adobe plugin directory
        run: |
          New-Item -ItemType Directory -Force -Path "C:\Program Files\Adobe\Common\Plug-ins\7.0\MediaCore\TrackerLabs"
        shell: pwsh

      - name: Build TrackerLabs AE plugin
        run: |
          msbuild `
            "$env:GITHUB_WORKSPACE\TrackerLabs_AEX_WIN\TrackerLabs\src\Win\TrackerLabs.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal
        shell: pwsh

      - name: Locate and upload .aex
        run: |
          $aex = Get-ChildItem -Path @("$env:GITHUB_WORKSPACE", "C:\Program Files\Adobe") -Filter "*.aex" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $aex) { Write-Error "No .aex found"; exit 1 }
          Write-Host "Found: $($aex.FullName)"
          Copy-Item $aex.FullName -Destination "$env:GITHUB_WORKSPACE\TrackerLabs.aex"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackerLabs-AE-Windows-x64
          path: TrackerLabs.aex
          if-no-files-found: error

  build-resolve-windows:
    name: Build Resolve OFX Plugin (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install OpenCL SDK from Khronos
        run: |
          $oclDir = "$env:GITHUB_WORKSPACE\TrackerLabsResolvePlugin_Win\TrackerLabsResolvePlugin\opencl"
          New-Item -ItemType Directory -Force -Path "$oclDir\lib\x64"
          
          # Download OpenCL SDK from Khronos GitHub
          $sdkUrl = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/v2024.05.08/OpenCL-SDK-v2024.05.08-Win-x64.zip"
          $zipPath = "$env:TEMP\opencl-sdk.zip"
          Invoke-WebRequest -Uri $sdkUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "$env:TEMP\opencl-sdk"
          
          # Find and copy OpenCL.lib
          $lib = Get-ChildItem -Path "$env:TEMP\opencl-sdk" -Filter "OpenCL.lib" -Recurse | Select-Object -First 1
          if ($lib) {
            Copy-Item $lib.FullName -Destination "$oclDir\lib\x64\OpenCL.lib"
            Write-Host "Installed: $oclDir\lib\x64\OpenCL.lib"
          } else {
            Write-Host "OpenCL SDK lib files:"
            Get-ChildItem -Path "$env:TEMP\opencl-sdk" -Filter "*.lib" -Recurse | ForEach-Object { Write-Host $_.FullName }
            Write-Error "OpenCL.lib not found in SDK download"
            exit 1
          }
        shell: pwsh

      - name: Build TrackerLabs Resolve OFX plugin
        run: |
          msbuild `
            "$env:GITHUB_WORKSPACE\TrackerLabsResolvePlugin_Win\TrackerLabsResolvePlugin\src\TrackerLabsResolvePlugin.sln" `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m `
            /v:minimal
        shell: pwsh

      - name: Locate and upload output
        run: |
          $ofx = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.ofx" -File -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch "\.h$" } | Select-Object -First 1
          $bundle = Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.ofx.bundle" -Directory -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($bundle) {
            Write-Host "Found bundle: $($bundle.FullName)"
            Add-Content -Path $env:GITHUB_ENV -Value "OFX_PATH=$($bundle.FullName)"
          } elseif ($ofx) {
            Write-Host "Found OFX: $($ofx.FullName)"
            Add-Content -Path $env:GITHUB_ENV -Value "OFX_PATH=$($ofx.FullName)"
          } else {
            Write-Error "No .ofx output found"
            exit 1
          }
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackerLabs-Resolve-Windows-x64
          path: ${{ env.OFX_PATH }}
          if-no-files-found: error
