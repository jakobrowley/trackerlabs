name: Build Windows Installers

on:
  workflow_dispatch:

jobs:
  build-zip-installers:
    name: Build Windows .zip Installers
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all plugin assets
        run: |
          # FastFX
          New-Item -ItemType Directory -Force -Path fastfx
          gh release download v2.0.0-new-license --repo jakobrowley/fastfx --pattern "*.zxp" --dir fastfx
          $zxp = Get-ChildItem fastfx -Filter "*.zxp" | Select-Object -First 1
          if ($zxp) { Expand-Archive -Path $zxp.FullName -DestinationPath fastfx_contents -Force }
          
          # Surveillance
          New-Item -ItemType Directory -Force -Path surveillance
          gh release download v1.0.0-new-license --repo jakobrowley/surveillance --pattern "*.zxp" --dir surveillance
          $zxp = Get-ChildItem surveillance -Filter "*.zxp" | Select-Object -First 1
          if ($zxp) { Expand-Archive -Path $zxp.FullName -DestinationPath surveillance_contents -Force }
          
          # Terminal
          New-Item -ItemType Directory -Force -Path terminal
          gh release download v1.0.0-new-license --repo jakobrowley/terminal --pattern "*.zxp" --dir terminal
          $zxp = Get-ChildItem terminal -Filter "*.zxp" | Select-Object -First 1
          if ($zxp) { Expand-Archive -Path $zxp.FullName -DestinationPath terminal_contents -Force }
          
          # TrackerLabs
          New-Item -ItemType Directory -Force -Path trackerlabs
          gh release download v1.0.0-new-license --repo jakobrowley/trackerlabs --pattern "TrackerLabs.aex" --dir trackerlabs 2>$null
          gh release download v1.0.0-new-license --repo jakobrowley/trackerlabs --pattern "TrackerLabs-Resolve-Win*" --dir trackerlabs 2>$null
          $zip = Get-ChildItem trackerlabs -Filter "*Resolve*Win*.zip" | Select-Object -First 1
          if ($zip) { Expand-Archive -Path $zip.FullName -DestinationPath trackerlabs_resolve -Force }
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build zip installers
        run: |
          New-Item -ItemType Directory -Force -Path output
          
          $plugins = @(
            @{ Name="FastFX"; Src="fastfx_contents"; Dest='%APPDATA%\Adobe\CEP\extensions\fastfx'; Admin=$false },
            @{ Name="Surveillance"; Src="surveillance_contents"; Dest='%APPDATA%\Adobe\CEP\extensions\Surveillance'; Admin=$false },
            @{ Name="Terminal"; Src="terminal_contents"; Dest='%APPDATA%\Adobe\CEP\extensions\com.example.terminal.panel'; Admin=$false }
          )
          
          foreach ($p in $plugins) {
            if (-not (Test-Path $p.Src)) { Write-Host "SKIP $($p.Name): $($p.Src) not found"; continue }
            $stageDir = "output\$($p.Name)"
            New-Item -ItemType Directory -Force -Path "$stageDir\plugin_files"
            Get-ChildItem -Path $p.Src | Copy-Item -Destination "$stageDir\plugin_files" -Recurse -Force
            
            @"
@echo off
echo ========================================
echo   Installing $($p.Name)
echo ========================================
echo.
set "DEST=$($p.Dest)"
call set "DEST=%DEST%"
if not exist "%DEST%" mkdir "%DEST%"
xcopy /E /Y /Q "%~dp0plugin_files\*" "%DEST%\"
echo.
echo $($p.Name) installed successfully!
echo Please restart your Adobe application.
echo.
pause
"@ | Set-Content -Path "$stageDir\Install $($p.Name).bat" -Encoding ASCII
            
            Compress-Archive -Path "$stageDir\*" -DestinationPath "output\$($p.Name)-Win-Installer.zip" -Force
            Write-Host "Built: $($p.Name)-Win-Installer.zip ($('{0:N1}' -f ((Get-Item "output\$($p.Name)-Win-Installer.zip").Length / 1MB)) MB)"
          }
          
          # TrackerLabs AE
          $aex = Get-ChildItem -Path "trackerlabs" -Filter "*.aex" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($aex) {
            $stageDir = "output\TrackerLabs-AE"
            New-Item -ItemType Directory -Force -Path "$stageDir\plugin_files"
            Copy-Item $aex.FullName -Destination "$stageDir\plugin_files\TrackerLabs.aex"
            @"
@echo off
echo ========================================
echo   Installing TrackerLabs for After Effects
echo   (Requires Administrator)
echo ========================================
echo.
set "DEST=%ProgramFiles%\Adobe\Common\Plug-ins\7.0\MediaCore\TrackerLabs"
if not exist "%DEST%" mkdir "%DEST%"
copy /Y "%~dp0plugin_files\TrackerLabs.aex" "%DEST%\TrackerLabs.aex"
echo.
echo TrackerLabs for After Effects installed!
echo Please restart After Effects.
echo.
pause
"@ | Set-Content -Path "$stageDir\Install TrackerLabs AE (Run as Admin).bat" -Encoding ASCII
            Compress-Archive -Path "$stageDir\*" -DestinationPath "output\TrackerLabs-AE-Win-Installer.zip" -Force
            Write-Host "Built: TrackerLabs-AE-Win-Installer.zip"
          }
          
          # TrackerLabs Resolve
          if (Test-Path "trackerlabs_resolve") {
            $stageDir = "output\TrackerLabs-Resolve"
            New-Item -ItemType Directory -Force -Path "$stageDir\plugin_files"
            Get-ChildItem -Path "trackerlabs_resolve" | Copy-Item -Destination "$stageDir\plugin_files" -Recurse -Force
            @"
@echo off
echo ========================================
echo   Installing TrackerLabs for DaVinci Resolve
echo   (Requires Administrator)
echo ========================================
echo.
set "DEST=%ProgramFiles%\Common Files\OFX\Plugins\TrackerLabsPlugin.ofx.bundle"
if not exist "%DEST%" mkdir "%DEST%"
xcopy /E /Y /Q "%~dp0plugin_files\*" "%DEST%\"
echo.
echo TrackerLabs for DaVinci Resolve installed!
echo Please restart DaVinci Resolve.
echo.
pause
"@ | Set-Content -Path "$stageDir\Install TrackerLabs Resolve (Run as Admin).bat" -Encoding ASCII
            Compress-Archive -Path "$stageDir\*" -DestinationPath "output\TrackerLabs-Resolve-Win-Installer.zip" -Force
            Write-Host "Built: TrackerLabs-Resolve-Win-Installer.zip"
          }
          
          Write-Host "`n=== All installers ==="
          Get-ChildItem output -Filter "*.zip" | ForEach-Object { Write-Host "  $($_.Name) ($('{0:N1}' -f ($_.Length / 1MB)) MB)" }
        shell: pwsh

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip-installers
          path: "output/*.zip"
          if-no-files-found: error
